<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BU2 Performance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh}
.nav{background:#161b27;border-bottom:1px solid #1e2d45;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{font-size:20px;font-weight:800;color:#6366f1;letter-spacing:-0.5px}
.nav-right{display:flex;align-items:center;gap:12px}
.date-chip{background:#1e2d45;padding:5px 12px;border-radius:6px;font-size:12px;color:#64748b}
.upload-btn{background:#1e2d45;border:1px solid #2d3f5e;color:#94a3b8;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .2s}
.upload-btn:hover{background:#2d3f5e;color:#e2e8f0}
.breadcrumb{padding:12px 24px;font-size:13px;display:flex;align-items:center;gap:8px;color:#475569}
.bc-link{cursor:pointer;color:#475569;transition:color .15s}.bc-link:hover{color:#94a3b8}
.bc-cur{color:#94a3b8;font-weight:600}
.bc-sep{color:#2d3f5e}
.view{display:none;padding:0 24px 32px}.view.active{display:block}
.section-hd{margin-bottom:20px}
.section-title{font-size:18px;font-weight:700;color:#e2e8f0}
.section-sub{font-size:12px;color:#475569;margin-top:3px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:18px 20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.c-att::before{background:#6366f1}
.kpi-card.c-con::before{background:#06b6d4}
.kpi-card.c-t1::before{background:#f59e0b}
.kpi-card.c-urg1::before{background:#10b981}
.kpi-card.c-urg2::before{background:#f43f5e}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#475569;margin-bottom:8px}
.kpi-value{font-size:36px;font-weight:800;line-height:1;color:#e2e8f0}
.kpi-value span{font-size:20px;color:#64748b}
.kpi-sub{font-size:11px;color:#475569;margin-top:6px}
.kpi-bar{height:4px;background:#1e2d45;border-radius:2px;margin-top:12px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .6s}
.c-att .kpi-bar-fill{background:#6366f1}.c-con .kpi-bar-fill{background:#06b6d4}.c-t1 .kpi-bar-fill{background:#f59e0b}
.c-urg1 .kpi-bar-fill{background:#10b981}.c-urg2 .kpi-bar-fill{background:#f43f5e}
.partner-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.pcard{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:20px;cursor:pointer;transition:all .2s}
.pcard:hover{border-color:#6366f1;transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.15)}
.pcard-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.pcard-name{font-size:14px;font-weight:700;color:#e2e8f0}
.pcard-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
.pb-ecu{background:#312e81;color:#a5b4fc}.pb-vu{background:#0c4a6e;color:#7dd3fc}.pb-uc{background:#064e3b;color:#6ee7b7}
.pcard-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.pm-label{font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.pm-value{font-size:22px;font-weight:800;color:#e2e8f0}
.pm-value.good{color:#10b981}.pm-value.warn{color:#f59e0b}.pm-value.bad{color:#f43f5e}
.pcard-footer{margin-top:14px;padding-top:12px;border-top:1px solid #1e2d45;font-size:11px;color:#475569;display:flex;justify-content:space-between}
.lb-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.lb-card{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:16px;overflow:hidden}
.lb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center}
.lb-title.c-att{color:#6366f1}.lb-title.c-con{color:#06b6d4}.lb-title.c-t1{color:#f59e0b}.lb-title.c-urg1{color:#10b981}.lb-title.c-urg2{color:#f43f5e}
.lb-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #1e2d45;gap:6px}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:11px;font-weight:700;color:#2d3f5e;width:16px;flex-shrink:0;text-align:right}
.lb-rank.r1{color:#fbbf24}.lb-rank.r2{color:#94a3b8}.lb-rank.r3{color:#b45309}
.lb-name{font-size:12px;font-weight:600;color:#94a3b8;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-pct{font-size:13px;font-weight:800;color:#e2e8f0;flex-shrink:0;text-align:right;min-width:52px;white-space:nowrap}
.lb-partner{font-size:10px;padding:1px 0;border-radius:3px;font-weight:700;text-align:center;display:block;overflow:hidden}
.lb-right{display:grid;grid-template-columns:34px 1fr;gap:6px;align-items:center;flex-shrink:0;min-width:105px}
.lb-right .lb-pct{text-align:right;white-space:nowrap}
.lbp-ECU{background:#312e81;color:#a5b4fc}.lbp-VU{background:#0c4a6e;color:#7dd3fc}.lbp-UC{background:#064e3b;color:#6ee7b7}
.chart-row{display:grid;gap:14px;margin-bottom:20px}
.chart-row.c2{grid-template-columns:1fr 1fr}.chart-row.c3{grid-template-columns:2fr 1fr 1fr}
.chart-card{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:18px}
.chart-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#475569;margin-bottom:14px}
.adv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.adv-tile{background:#161b27;border:1px solid #1e2d45;border-left:4px solid #2d3f5e;border-radius:8px;padding:16px;cursor:pointer;transition:all .15s;position:relative}
.adv-tile:hover{border-color:#6366f1;transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.15)}
.adv-tile.g{border-left-color:#10b981}.adv-tile.a{border-left-color:#f59e0b}.adv-tile.r{border-left-color:#f43f5e}
.adv-name{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:12px;padding-right:20px;line-height:1.3}
.adv-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.am-label{font-size:9px;color:#475569;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.am-value{font-size:16px;font-weight:800;color:#e2e8f0}
.rag-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:14px;right:14px}
.rag-dot.g{background:#10b981}.rag-dot.a{background:#f59e0b}.rag-dot.r{background:#f43f5e;box-shadow:0 0 6px rgba(244,63,94,.5)}
.adv-hd{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:22px;margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.adv-hd-left .adv-hd-name{font-size:22px;font-weight:800;color:#e2e8f0}
.adv-hd-left .adv-hd-partner{font-size:13px;color:#475569;margin-top:3px}
.adv-hd-kpis{display:flex;gap:24px;align-items:center}
.ahk{text-align:center}
.ahk-value{font-size:26px;font-weight:800}
.ahk-label{font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;margin-top:2px}
.rag-pill{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700}
.rag-pill.g{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.rag-pill.a{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.rag-pill.r{background:rgba(244,63,94,.15);color:#f43f5e;border:1px solid rgba(244,63,94,.3)}
.tbl-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tbtn{padding:5px 12px;border-radius:20px;border:1px solid #1e2d45;background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:#64748b;transition:all .15s}
.tbtn:hover{border-color:#475569;color:#94a3b8}
.tbtn.act{background:#6366f1;color:white;border-color:#6366f1}
.tbtn .tc{background:rgba(255,255,255,.2);border-radius:8px;padding:1px 6px;font-size:10px;margin-left:4px}
.tbl-wrap{background:#161b27;border:1px solid #1e2d45;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#0d1117;padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#475569;border-bottom:1px solid #1e2d45;cursor:pointer;white-space:nowrap}
thead th:hover{color:#94a3b8}
tbody tr{border-bottom:1px solid #0d1117;transition:background .1s}
tbody tr:hover{background:#0d1117}
tbody td{padding:9px 12px;color:#94a3b8;vertical-align:middle}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.be{background:rgba(16,185,129,.15);color:#10b981}.bna{background:#1e2d45;color:#475569}.bl{background:rgba(245,158,11,.15);color:#f59e0b}
.biy{background:rgba(16,185,129,.15);color:#10b981}.bin{background:rgba(244,63,94,.15);color:#f43f5e}.biu{background:rgba(245,158,11,.15);color:#f59e0b}.bix{background:#1e2d45;color:#475569}
.cpill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.cp07{background:rgba(16,185,129,.2);color:#10b981}.cp814{background:rgba(16,185,129,.15);color:#10b981}.cp1530{background:rgba(245,158,11,.15);color:#f59e0b}
.cp3160{background:rgba(251,146,60,.15);color:#fb923c}.cp60{background:rgba(244,63,94,.15);color:#f43f5e}.cpnev{background:#1e2d45;color:#475569;font-style:italic}
.rflags{display:flex;gap:3px;flex-wrap:wrap}
.rf{width:18px;height:18px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.rf-aw{background:rgba(244,63,94,.2);color:#f43f5e}.rf-ac{background:rgba(99,102,241,.2);color:#818cf8}.rf-fi{background:rgba(245,158,11,.2);color:#f59e0b}
.rf-pe{background:rgba(244,63,94,.15);color:#fb7185}.rf-te{background:rgba(6,182,212,.2);color:#22d3ee}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid #1e2d45;font-size:12px;color:#475569}
.pbtns{display:flex;gap:3px}
.pbtn{padding:3px 9px;border-radius:4px;border:1px solid #1e2d45;background:transparent;font-size:11px;cursor:pointer;color:#64748b}
.pbtn:hover{background:#1e2d45}.pbtn.act{background:#6366f1;color:white;border-color:#6366f1}
.no-data{padding:32px;text-align:center;color:#475569;font-size:13px}
.warnings{margin-bottom:20px}
.warn-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#f43f5e;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.warn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.warn-item{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);border-radius:6px;padding:10px 14px;font-size:12px}
.warn-item strong{color:#f43f5e;display:block;margin-bottom:2px}.warn-item span{color:#94a3b8}
.partner-rank-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.pr-card{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:14px 12px;overflow:hidden}
.pr-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}
.pr-title.c-att{color:#6366f1}.pr-title.c-con{color:#06b6d4}.pr-title.c-t1{color:#f59e0b}.pr-title.c-urg1{color:#10b981}.pr-title.c-urg2{color:#f43f5e}
.pr-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e2d45;gap:8px;cursor:pointer;transition:background .1s}
.pr-row:last-child{border-bottom:none}.pr-row:hover{background:rgba(255,255,255,.03)}
.pr-left{display:flex;align-items:center;gap:7px;flex-shrink:0}
.pr-rank{font-size:13px;font-weight:700;width:14px;color:#475569}.pr-rank.r1{color:#fbbf24}
.pr-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0}
.pr-badge.b-ecu{background:#312e81;color:#a5b4fc}.pr-badge.b-vu{background:#0c4a6e;color:#7dd3fc}.pr-badge.b-uc{background:#064e3b;color:#6ee7b7}
.pr-right{text-align:right}
.pr-pct{font-size:18px;font-weight:800}
.pr-bar{height:2px;background:#1e2d45;border-radius:1px;margin-top:4px;width:56px;margin-left:auto;overflow:hidden}
.pr-bar-fill{height:100%;border-radius:1px}
.lb-expand{width:100%;margin-top:8px;padding:5px 0;background:transparent;border:none;border-top:1px solid #1e2d45;color:#475569;font-size:11px;font-weight:600;cursor:pointer;text-align:center;letter-spacing:.4px;transition:color .15s}
.lb-expand:hover{color:#94a3b8}
.lb-hidden{display:none}
.period-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.period-btn{padding:5px 14px;border-radius:6px;border:1px solid #10b981;background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:#10b981;transition:all .15s;white-space:nowrap}
.period-btn:hover{background:rgba(16,185,129,0.12)}
.period-btn.act{background:#10b981;color:#0d1117}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}.lb-grid{grid-template-columns:repeat(2,1fr)}.partner-row{grid-template-columns:1fr}.chart-row.c2{grid-template-columns:1fr}}
</style>
</head>

  </div>

    <input type="file" id="fileInput" style="display:none" accept=".xlsx">
  </div>
</div>

<!-- BU2 VIEW -->
<div class="view active" id="view-bu2">
  <div style="height:16px"></div>
  <div style="padding:0 24px">
    <div class="section-hd">
      <div class="section-title">BU2 &mdash; Team Dashboard</div>
      <div class="section-sub" id="bu2-sub">Loading&hellip;</div>

        <div class="lb-card">
          <div class="lb-title" style="color:#10b981">Best call conversion</div>
          <div id="lb-conv"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PARTNER VIEW -->
<div class="view" id="view-partner">
  <div style="height:16px"></div>
  <div style="padding:0 24px">
    <div class="section-hd">
      <div class="section-title" id="p-title">Partner</div>
      <div class="section-sub" id="p-sub"></div>
    </div>
    <div class="kpi-row" id="p-kpis"></div>
    <div style="margin-bottom:10px;font-size:11px;color:#475569;display:flex;align-items:center;gap:16px">

    <div class="lb-grid" id="p-lb-grid"></div>

    <div class="adv-hd" id="adv-hd"></div>

      <div class="chart-card">
        <div class="chart-title">Contact Recency</div>

        <div class="chart-title">Key KPIs vs BU2 Average</div>

      <div class="pagination" id="tbl-pag"></div>
    </div>
  </div>
</div>

/* ── KPI CARD ── */
function kpiCard(cls,label,value,n,d,sub){
  var w=d?Math.round(value||0):0, c=col(value);
  return '<div class="kpi-card '+cls+'"><div class="kpi-label">'+label+'</div>'
    +'<div class="kpi-value" style="color:'+c+'">'+(value!==null?value:'&mdash;')+'<span>%</span></div>'
    +'<div class="kpi-sub">'+n+' of '+d+' '+sub+'</div>'
    +'<div class="kpi-bar"><div class="kpi-bar-fill" style="width:'+Math.min(w,100)+'%"></div></div></div>';
}

/* ── LEADERBOARD ── */
var _lbId=0;
function lb(title,cls,field,allAdvs){
  var sorted=allAdvs.filter(function(a){return a[field]!==null&&a[field]>0;}).sort(function(a,b){return b[field]-a[field];});
  var id='lb-'+(++_lbId);
  var rows=sorted.map(function(a,i){
    var rankCls=i===0?'r1':i===1?'r2':i===2?'r3':'';
    var hidden=i>=6?' class="lb-hidden"':'';
    var pInfo=PARTNERS[a.partner]||{};
    return '<div'+hidden+' data-lb="'+id+'">'
      +'<div class="lb-row">'
      +'<div class="lb-rank '+rankCls+'">'+(i+1)+'</div>'
      +'<div class="lb-name" title="'+a.name+'">'+a.name.split(' ')[0]+' '+(a.name.split(' ')[1]||'')+'</div>'
      +'<div class="lb-right"><span class="lb-partner '+(pInfo.lbCls||'')+'">'+a.partner+'</span>'
      +'<div class="lb-pct" style="color:'+col(a[field])+'">'+a[field]+'%</div></div>'
      +'</div></div>';
  }).join('');
  var extra=sorted.length-6;
  var toggle=extra>0
    ?'<button class="lb-expand" id="btn-'+id+'" data-id="'+id+'" data-extra="'+extra+'" data-showing="0" onclick="toggleLb(this)">&#9662; Show all '+sorted.length+'</button>'
    :'';
  return '<div class="lb-card"><div class="lb-title '+cls+'">'+title+'</div>'+(rows||'<div class="no-data">No data</div>')+toggle+'</div>';
}
function toggleLb(btn){
  var id=btn.getAttribute('data-id');
  var extra=parseInt(btn.getAttribute('data-extra'));
  var showing=btn.getAttribute('data-showing')==='1';
  document.querySelectorAll('[data-lb="'+id+'"]').forEach(function(r,i){
    if(!showing){ r.classList.remove('lb-hidden'); }
    else if(i>=6){ r.classList.add('lb-hidden'); }
  });
  btn.innerHTML=showing?'&#9662; Show all '+(6+extra):'&#9652; Show less';
  btn.setAttribute('data-showing',showing?'0':'1');
}

      +'<div><div class="am-label">URG2%</div><div class="am-value" style="color:'+col(a.pct_urg2,75,90)+'">'+(a.pct_urg2!=null?a.pct_urg2:'&mdash;')+'</div></div>'
      +'<div><div class="am-label">Pool</div><div class="am-value">'+a.pool+'</div></div>'
      +'</div></div>';
  }).join('');
  document.getElementById('p-lb-grid').innerHTML=
    lb('% Attempted','c-att','pct_att',all)+
    lb('% Contacted','c-con','pct_con',all)+
    lb('T1 Enrolled %','c-t1','pct_t1',all)+
    lb('URG1 Enrolled %','c-urg1','pct_urg1',all)+
    lb('URG2 Enrolled %','c-urg2','pct_urg2',all);
}

/* ── ADVISOR VIEW ── */
function renderAdvisor(name){
  var a=D.advisors[name], students=(D.students&&D.students[name])||[], b=D.partner_totals.BU2;
  var ragOf=function(x){ var avg=(x.pct_att||0)+(x.pct_con||0)+(x.pct_t1||0)+(x.pct_urg1||0)+(x.pct_urg2||0); return avg>=400?'g':avg>=300?'a':'r'; };
  var rag=ragOf(a);
  var ragLabel={g:'&#10003; On Track',a:'&#9889; Monitor',r:'&#9888; Attention'}[rag];
  document.getElementById('adv-hd').innerHTML=
    '<div class="adv-hd-left"><div class="adv-hd-name">'+a.name+'</div>'
    +'<div class="adv-hd-partner">'+(PARTNERS[a.partner]?PARTNERS[a.partner].label:a.partner)+' · '+a.pool+' eligible students</div></div>'
    +'<div class="adv-hd-kpis">'
    +'<div class="ahk"><div class="ahk-value" style="color:'+col(a.pct_att)+'">'+(a.pct_att!=null?a.pct_att:'&mdash;')+'%</div><div class="ahk-label">Attempted</div></div>'
    +'<div class="ahk"><div class="ahk-value" style="color:'+col(a.pct_con)+'">'+(a.pct_con!=null?a.pct_con:'&mdash;')+'%</div><div class="ahk-label">Contacted</div></div>'
    +'<div class="ahk"><div class="ahk-value" style="color:'+col(a.pct_t1,75,90)+'">'+(a.pct_t1!=null?a.pct_t1:'&mdash;')+'%</div><div class="ahk-label">T1 Enrolled</div></div>'
    +'<div class="ahk"><div class="ahk-value" style="color:'+col(a.pct_urg1,80,95)+'">'+(a.pct_urg1!=null?a.pct_urg1:'&mdash;')+'%</div><div class="ahk-label">URG1 Enrolled</div></div>'
    +'<div class="ahk"><div class="ahk-value" style="color:'+col(a.pct_urg2,75,90)+'">'+(a.pct_urg2!=null?a.pct_urg2:'&mdash;')+'%</div><div class="ahk-label">URG2 Enrolled</div></div>'
    +'<div class="rag-pill '+rag+'">'+ragLabel+'</div></div>';
  renderTable(students);
}

/* ── STUDENT TABLE ── */
function renderTable(allS){
  var enrolled=allS.filter(function(s){return s.status==='Enrolled';});
  var atRisk=allS.filter(function(s){return s.r_aw||s.r_ac||s.r_fi||s.r_pe;});
  var noContact=allS.filter(function(s){return s.bucket==='Never'||s.bucket==='60+d';});
  var nextWD=allS.filter(function(s){return s.next_term==='Withdrawn';});
  var intNo=allS.filter(function(s){return s.intent==='No'||s.intent==='Pending Withdrawn';});
  var filters=[
    {id:'all',label:'All',n:allS.length},
    {id:'enrolled',label:'Enrolled',n:enrolled.length},
    {id:'at-risk',label:'&#9888; At Risk',n:atRisk.length},
    {id:'no-contact',label:'No Recent Contact',n:noContact.length},
    {id:'next-wd',label:'Withdrawing',n:nextWD.length},
    {id:'intent-no',label:'Intent: No',n:intNo.length}
  ];
  document.getElementById('tbl-controls').innerHTML=filters.map(function(f){
    return '<button class="tbtn '+(S.filter===f.id?'act':'')+'" data-fid="'+f.id+'" onclick="setFilter(this.getAttribute(\'data-fid\'))">'+f.label+'<span class="tc">'+f.n+'</span></button>';
  }).join('');
  var fm={all:allS,enrolled:enrolled,'at-risk':atRisk,'no-contact':noContact,'next-wd':nextWD,'intent-no':intNo};
  var data=fm[S.filter]||allS;
  if(S.sort){
    data=data.slice().sort(function(a,b){
      var va=a[S.sort],vb=b[S.sort];
      if(va===null||va===undefined) va=S.sortDir>0?Infinity:-Infinity;
      if(vb===null||vb===undefined) vb=S.sortDir>0?Infinity:-Infinity;
      return S.sortDir*(va>vb?1:va<vb?-1:0);
    });
  }
  var total=data.length, pages=Math.ceil(total/S.pageSize), start=(S.page-1)*S.pageSize, pg=data.slice(start,start+S.pageSize);
  var cpMap={'0-7d':'cp07','8-14d':'cp814','15-30d':'cp1530','31-60d':'cp3160','60+d':'cp60','Never':'cpnev'};
  var cpL={'0-7d':'0–7d','8-14d':'8–14d','15-30d':'15–30d','31-60d':'31–60d','60+d':'60+ days','Never':'Never'};
  var sBadge=function(s){return ({Enrolled:'<span class="badge be">Enrolled</span>','Not Active':'<span class="badge bna">Not Active</span>','Leave of Absence':'<span class="badge bl">LOA</span>'}[s])||'<span class="badge bna">'+(s||'&mdash;')+'</span>';};
  var iBadge=function(i){return ({Yes:'<span class="badge biy">Yes</span>',No:'<span class="badge bin">No</span>',Undecided:'<span class="badge biu">Undecided</span>','Pending Withdrawn':'<span class="badge bin">Pending WD</span>'}[i])||'<span class="badge bix">'+(i||'&mdash;')+'</span>';};
  var riskF=function(s){var f='';if(s.r_aw)f+='<span class="rf rf-aw">AW</span>';if(s.r_ac)f+='<span class="rf rf-ac">AC</span>';if(s.r_fi)f+='<span class="rf rf-fi">FI</span>';if(s.r_pe)f+='<span class="rf rf-pe">PE</span>';if(s.r_te)f+='<span class="rf rf-te">TE</span>';return f?'<div class="rflags">'+f+'</div>':'&mdash;';};
  document.getElementById('tbl-body').innerHTML=pg.length?pg.map(function(s){
    return '<tr>'
      +'<td style="font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e2e8f0" title="'+(s.name||'')+'">'+(s.name||'&mdash;')+'</td>'
      +'<td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px" title="'+(s.program||'')+'">'+(s.program||'&mdash;')+'</td>'
      +'<td>'+sBadge(s.status)+'</td><td>'+sBadge(s.next_term)+'</td><td>'+iBadge(s.intent)+'</td>'
      +'<td><span class="cpill '+(cpMap[s.bucket]||'cpnev')+'">'+(cpL[s.bucket]||s.bucket||'')+(s.days!=null?' · '+s.days+'d':'')+'</span></td>'
      +'<td>'+riskF(s)+'</td>'
      +'<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:#475569" title="'+(s.notes||s.last_subj||'')+'">'+(s.notes||s.last_subj||'&mdash;')+'</td></tr>';
  }).join(''):'<tr><td colspan="8" class="no-data">No students match this filter.</td></tr>';
  var ph='<span>Showing '+(start+1)+'–'+Math.min(start+S.pageSize,total)+' of '+total+'</span>';
  if(pages>1){ph+='<div class="pbtns">'+Array.from({length:Math.min(pages,10)},function(_,i){return '<button class="pbtn '+(i+1===S.page?'act':'')+'" onclick="goPage('+(i+1)+')">'+(i+1)+'</button>';}).join('')+(pages>10?'<span style="padding:3px 6px;color:#475569">…'+pages+'</span>':'')+'</div>';}
  document.getElementById('tbl-pag').innerHTML=ph;
}
function setFilter(f){ S.filter=f;S.page=1;renderTable((D.students&&D.students[S.advisor])||[]); }
function goPage(p){ S.page=p;renderTable((D.students&&D.students[S.advisor])||[]); }
function sortTbl(f){
  if(S.sort===f)S.sortDir*=-1;else{S.sort=f;S.sortDir=1;}
  ['name','prog','days'].forEach(function(x){var el=document.getElementById('s-'+x);if(el)el.textContent='';});
  var map={name:'s-name',program:'s-prog',days:'s-days'};
  if(map[f]){var el=document.getElementById(map[f]);if(el)el.textContent=S.sortDir>0?'↑':'↓';}
  S.page=1;renderTable((D.students&&D.students[S.advisor])||[]);
}

/* ── PHONE ACTIVITY ── */
function setPeriod(p){
  S.phonePeriod=p;
  document.querySelectorAll('.period-btn').forEach(function(b){b.classList.toggle('act',b.getAttribute('data-period')===p);});
  renderWeekly();
}
function renderWeekly(){
  var data=PA[S.phonePeriod];
  var el=document.getElementById('last-updated-ts'); if(el&&W.last_updated) el.textContent=W.last_updated;
  document.getElementById('week-partner-stats').innerHTML=['ECU','VU','UC'].map(function(p){
    var t=data.partners[p];
    return '<div style="background:#161b27;border:1px solid #1e2d45;border-radius:8px;padding:12px 14px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#475569;margin-bottom:10px;display:flex;justify-content:space-between">'
      +'<span>'+p+'</span><span class="pr-badge b-'+p.toLowerCase()+'">'+p+'</span></div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;text-align:center">'
      +'<div><div style="font-size:18px;font-weight:800;color:#e2e8f0">'+t.calls+'</div><div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:2px">Calls</div></div>'
      +'<div><div style="font-size:18px;font-weight:800;color:#06b6d4">'+t.sts+'</div><div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:2px">STS</div></div>'
      +'<div><div style="font-size:18px;font-weight:800;color:'+col(t.conversion,45,65)+'">'+t.conversion+'%</div><div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:2px">Conv.</div></div>'
      +'</div></div>';
  }).join('');

  function weekLb(elId,sorted,valFn){
    var id='lb-'+(++_lbId);
    var rows=sorted.map(function(item,i){
      var a=item[0], d=item[1];
      var rankCls=i===0?'r1':i===1?'r2':i===2?'r3':'';
      var hidden=i>=6?' class="lb-hidden"':'';
      var pInfo=PARTNERS[d.partner]||{};
      return '<div'+hidden+' data-lb="'+id+'">'
        +'<div class="lb-row">'
        +'<div class="lb-rank '+rankCls+'">'+(i+1)+'</div>'
        +'<div class="lb-name" title="'+a+'">'+a.split(' ').slice(0,2).join(' ')+'</div>'
        +'<div class="lb-right"><span class="lb-partner '+(pInfo.lbCls||'')+'">'+d.partner+'</span>'+valFn(d)+'</div>'
        +'</div></div>';
    }).join('');
    var extra=sorted.length-6;
    var btn=extra>0?'<button class="lb-expand" data-id="'+id+'" data-extra="'+extra+'" data-showing="0" onclick="toggleLb(this)">&#9662; Show all '+sorted.length+'</button>':'';
    var el=document.getElementById(elId);
    el.innerHTML=rows||'<div class="no-data">No calls recorded</div>';
    if(btn) el.innerHTML+=btn;
  }

  var bySTS=Object.entries(data.advisors).filter(function(e){return e[1].calls>0;}).sort(function(a,b){return b[1].sts-a[1].sts;});
  weekLb('lb-sts',bySTS,function(d){return '<div class="lb-pct" style="color:#06b6d4">'+d.sts+'<span style="font-size:10px;color:#475569;margin-left:3px">/ '+d.calls+'</span></div>';});
  var byConv=Object.entries(data.advisors).filter(function(e){return e[1].calls>0;}).sort(function(a,b){return b[1].conversion-a[1].conversion;});
  weekLb('lb-conv',byConv,function(d){return '<div class="lb-pct" style="color:'+col(d.conversion,45,65)+'">'+d.conversion+'%<span style="font-size:10px;color:#475569;margin-left:3px">/ '+d.calls+'</span></div>';});
}

/* ── INIT ── */
renderBU2();
renderWeekly();
setBreadcrumb();
