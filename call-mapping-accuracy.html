const typeLabels = ['CS Engagement', 'Registration', 'Reengagement', 'T1', 'Welcome'];

const ERROR_STORE = {};
DATA.forEach((p, pi) => {
  if (p.total.errors) {
    p.total.errors.forEach((errs, ti) => {
      ERROR_STORE[`${pi}-${ti}`] = { partner: p.partner, typeIdx: ti, errors: errs };
    });
  }
});

function badgeClass(t) {
  if (t === 'CS') return 'badge-cs';
  if (t === 'Rego') return 'badge-rego';
  if (t === 'T1') return 'badge-t1';
  if (t === 'Welcome') return 'badge-welcome';
  return 'badge-reengage';
}

function deltaClass(d) {
  if (d > 0) return 'delta-over';
  if (d < 0) return 'delta-under';
  return 'delta-ok';
}

function deltaLabel(d) {
  if (d > 0) return `+${d} over`;
  if (d < 0) return `${d} under`;
  return '\u2713';
}

function openModal(partner, typeIdx, errors) {
  const label = typeLabels[typeIdx];
  document.getElementById('modal-title').textContent = `${partner} — ${label} discrepancies`;
  document.getElementById('modal-subtitle').textContent = `${errors.length} incorrectly mapped call${errors.length !== 1 ? 's' : ''}`;
  const body = document.getElementById('modal-body');
  if (errors.length === 0) {
    body.innerHTML = '<p class="empty-msg">No misclassified students found for this call type.</p>';
  } else {
    let html = `<table class="student-table">
      <thead><tr>
        <th>Student</th><th>Advisor</th><th>Logged</th><th></th><th>Should Be</th><th>Enrol Status</th><th>Next Term</th>
      </tr></thead><tbody>`;
    errors.forEach(e => {
      html += `<tr>
        <td>${e.student}</td>
        <td style="color:#666">${e.advisor}</td>
        <td><span class="badge ${badgeClass(e.logged)}">${e.logged}</span></td>
        <td class="arrow">&rarr;</td>
        <td><span class="badge ${badgeClass(e.expected)}">${e.expected}</span></td>
        <td style="color:#666;font-size:11px">${e.enrol}</td>
        <td style="color:#666;font-size:11px">${e.next_term}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

const container = document.getElementById('tables');

DATA.forEach((p, pi) => {
  const block = document.createElement('div');
  block.className = 'partner-block';

  const hdr = document.createElement('div');
  hdr.className = 'partner-header';
  hdr.textContent = p.partner;
  block.appendChild(hdr);

  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th class="left" rowspan="2" style="width:200px">Advisor</th>
        <th colspan="3" class="group-header col-group">CS Engagement</th>
        <th colspan="3" class="group-header col-group">Registration</th>
        <th colspan="3" class="group-header col-group">Reengagement</th>
        <th colspan="3" class="group-header-t1 col-group">T1</th>
        <th colspan="3" class="group-header-welcome col-group">Welcome</th>
      </tr>
      <tr>
        <th class="col-group">Logged</th><th>Expected</th><th>Delta</th>
        <th class="col-group">Logged</th><th>Expected</th><th>Delta</th>
        <th class="col-group">Logged</th><th>Expected</th><th>Delta</th>
        <th class="col-group">Logged</th><th>Expected</th><th>Delta</th>
        <th class="col-group">Logged</th><th>Expected</th><th>Delta</th>
      </tr>
    </thead><tbody></tbody>`;

  const tbody = table.querySelector('tbody');
  const allRows = [...p.advisors, p.total];

  allRows.forEach((row, idx) => {
    const isTotal = idx === allRows.length - 1;
    const tr = document.createElement('tr');
    if (isTotal) tr.className = 'total-row';

    const advisorTd = document.createElement('td');
    advisorTd.className = 'advisor';
    advisorTd.textContent = row.name;
    tr.appendChild(advisorTd);

    row.data.forEach((d, i) => {
      const dc = deltaClass(d.delta);
      const dl = deltaLabel(d.delta);

      const tdLogged = document.createElement('td');
      tdLogged.className = 'col-group';
      tdLogged.style.textAlign = 'center';
      tdLogged.textContent = d.logged;
      tr.appendChild(tdLogged);

      const tdExpected = document.createElement('td');
      tdExpected.style.cssText = 'text-align:center;color:#888';
      tdExpected.textContent = d.expected;
      tr.appendChild(tdExpected);

      const tdDelta = document.createElement('td');
      tdDelta.style.textAlign = 'center';

      const span = document.createElement('span');
      span.className = `delta ${dc}`;
      span.textContent = dl;

      const storeKey = `${pi}-${i}`;
      const store = ERROR_STORE[storeKey];
      if (isTotal && store && store.errors.length > 0 && d.delta !== 0) {
        span.classList.add('delta-clickable');
        span.title = 'Click to see affected students';
        span.addEventListener('click', () => openModal(store.partner, store.typeIdx, store.errors));
      }

      tdDelta.appendChild(span);
      tr.appendChild(tdDelta);
    });

    tbody.appendChild(tr);
  });

  block.appendChild(table);

  const summary = document.createElement('div');
  summary.className = 'summary-bar';
  const label = document.createElement('span');
  label.style.cssText = 'font-size:11px;color:#888';
  label.textContent = 'Partner total discrepancy:';
  summary.appendChild(label);

  let anyPill = false;
  p.total.data.forEach((d, i) => {
    if (d.delta === 0) return;
    anyPill = true;
    const cls = d.delta > 0 ? 'pill-red' : 'pill-orange';
    const sign = d.delta > 0 ? '+' : '';
    const pill = document.createElement('span');
    pill.className = `summary-pill ${cls}`;
    pill.textContent = `${typeLabels[i]}: ${sign}${d.delta}`;
    const storeKey = `${pi}-${i}`;
    const store = ERROR_STORE[storeKey];
    if (store && store.errors.length > 0) {
      pill.style.cssText = 'cursor:pointer;text-decoration:underline dotted';
      pill.title = 'Click to see affected students';
      pill.addEventListener('click', () => openModal(store.partner, store.typeIdx, store.errors));
    }
    summary.appendChild(pill);
  });
  if (!anyPill) {
    const ok = document.createElement('span');
    ok.className = 'summary-pill pill-green';
    ok.textContent = 'All correct';
    summary.appendChild(ok);
  }
  block.appendChild(summary);

  container.appendChild(block);
});
</script>
