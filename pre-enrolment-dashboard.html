<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BU2 · Pre-Enrolment Dashboard — 10 Jun 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh}

/* HEADER */
.tl-header{background:#161b27;border-bottom:1px solid #1e2d45;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tl-title{font-size:16px;font-weight:700;color:#e2e8f0;letter-spacing:.3px}
.tl-sub{font-size:11px;color:#475569;margin-top:2px}
.tl-badges{display:flex;gap:8px;align-items:center}
.tl-badge{background:#1e2d45;color:#94a3b8;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.tl-date{background:#1e2d45;color:#64748b;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px}

/* KPI CARDS */
.kpi-section{padding:20px 24px 4px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.c-pool::before{background:#6366f1}
.kpi-card.c-t5::before{background:#10b981}
.kpi-card.c-t6::before{background:#f59e0b}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#475569;margin-bottom:6px}
.kpi-value{font-size:32px;font-weight:800;line-height:1;color:#e2e8f0}
.kpi-value.good{color:#10b981}.kpi-value.warn{color:#f59e0b}.kpi-value.bad{color:#f43f5e}
.kpi-sub{font-size:11px;color:#475569;margin-top:5px}
.kpi-bar{height:3px;background:#1e2d45;border-radius:2px;margin-top:10px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px}

/* PARTNER CARDS */
.partner-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.pcard{background:#161b27;border:1px solid #1e2d45;border-radius:10px;padding:18px 20px}
.pcard-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pcard-name{font-size:13px;font-weight:700;color:#e2e8f0}
.pcard-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
.pb-ecu{background:#312e81;color:#a5b4fc}
.pb-vu{background:#0c4a6e;color:#7dd3fc}
.pb-uc{background:#064e3b;color:#6ee7b7}
.pcard-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pm-label{font-size:9px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.pm-value{font-size:20px;font-weight:800;color:#e2e8f0}
.pm-value.good{color:#10b981}.pm-value.warn{color:#f59e0b}.pm-value.bad{color:#f43f5e}
.pcard-bar{height:3px;background:#1e2d45;border-radius:2px;margin-top:12px;overflow:hidden}
.pcard-trend{display:flex;gap:4px;margin-top:10px;align-items:flex-end;height:24px}
.pcard-trend-bar{border-radius:2px 2px 0 0;flex:1}

/* SECTION HEADER */
.section-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#475569;padding:0 24px 10px}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;padding:0 24px 14px;flex-wrap:wrap;align-items:center}
.fbtn{background:#161b27;border:1px solid #1e2d45;color:#64748b;font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;transition:.15s}
.fbtn:hover{border-color:#475569;color:#94a3b8}
.fbtn.act{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd}
.sort-hint{font-size:10px;color:#334155;margin-left:auto;padding-right:2px}

/* TABLE */
.tbl-wrap{padding:0 24px 32px;overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#0d1117;color:#475569;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:10px 12px;text-align:right;border-bottom:2px solid #1e2d45;white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover{color:#94a3b8}
.tbl th.left{text-align:left}
.tbl th .sort-arrow{margin-left:4px;opacity:.4;font-size:9px}
.tbl th.sorted .sort-arrow{opacity:1;color:#f59e0b}
.tbl th.t6-col{background:#1a1506;border-bottom:2px solid #f59e0b}
.tbl td{padding:10px 12px;border-bottom:1px solid #0d1117;text-align:right;color:#e2e8f0;font-weight:600;vertical-align:middle}
.tbl td.left{text-align:left;color:#cbd5e1;font-weight:500}
.tbl td.t6-col{background:#120f02}
.tbl tr.adv-row{cursor:pointer;transition:background .1s}
.tbl tr.adv-row:hover td{background:#161b27}
.tbl tr.adv-row:hover td.t6-col{background:#1c1504}
.tbl tr.adv-row.expanded td{background:#161b27;border-bottom:none}
.tbl tr.adv-row.expanded td.t6-col{background:#1c1504;border-bottom:none}
.tbl tfoot td{border-top:2px solid #1e2d45;background:#0d1117;font-weight:700;color:#94a3b8;font-size:12px}
.tbl tfoot td.t6-col{background:#120f02}

/* PARTNER BADGES */
.lb-partner{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:700;display:inline-block}
.lbp-ECU{background:#312e81;color:#a5b4fc}
.lbp-VU{background:#0c4a6e;color:#7dd3fc}
.lbp-UC{background:#064e3b;color:#6ee7b7}

/* BAR CELL */
.bar-bg{background:#1e2d45;border-radius:3px;height:5px;overflow:hidden;margin-top:4px;width:60px}
.bar-fill{height:5px;border-radius:3px}

/* EXPAND CHEVRON */
.chev{display:inline-block;font-size:10px;color:#2d3f5e;transition:transform .2s;margin-left:6px}
.expanded .chev{transform:rotate(90deg)}

/* EXPANDED ROW */
.expand-row td{padding:0!important;border-bottom:1px solid #1e2d45!important}
.expand-panel{background:#0d1117;padding:16px 24px;display:none}
.expand-row.open .expand-panel{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
.ep-section{flex:1;min-width:200px}
.ep-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#475569;margin-bottom:10px}
.ep-divider{width:1px;background:#1e2d45;flex-shrink:0}
.ep-term{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ep-term-label{font-size:10px;font-weight:700;color:#475569;width:20px}
.ep-term-bar-bg{background:#1e2d45;border-radius:3px;height:6px;flex:1;overflow:hidden}
.ep-term-bar{height:6px;border-radius:3px}
.ep-term-pct{font-size:11px;font-weight:700;min-width:42px;text-align:right}
.ep-term-n{font-size:10px;color:#475569;min-width:50px;text-align:right}
.ep-metric{}
.ep-label{font-size:9px;color:#475569;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.ep-value{font-size:20px;font-weight:800;color:#e2e8f0}
.ep-sub{font-size:10px;color:#475569;margin-top:2px}

/* SHOW MORE */
.show-more-row td{background:#0d1117;border-bottom:none;text-align:center;padding:10px}
.show-more-btn{background:transparent;border:1px solid #1e2d45;color:#475569;font-size:11px;font-weight:600;padding:6px 16px;border-radius:6px;cursor:pointer;letter-spacing:.3px;transition:all .15s}
.show-more-btn:hover{border-color:#475569;color:#94a3b8}


/* T6 HIGHLIGHT BADGE */
.t6-star{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#422006;color:#f59e0b;margin-left:6px;vertical-align:middle}

/* NO DATA */
.no-data{padding:40px;text-align:center;color:#475569;font-size:13px}

@media(max-width:1100px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:900px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .partner-row{grid-template-columns:1fr}
  .pcard-metrics{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="tl-header">
  <div>
    <div class="tl-title">BU2 · Pre-Enrolment Dashboard</div>
    <div class="tl-sub">Advisor cohort conversion by teaching period · T5 → T6 · Pre-enrolment performance</div>
  </div>
  <div class="tl-badges">
    <span class="tl-badge">PRE-ENROL</span>
    <span class="tl-date">10 Jun 2026</span>
  </div>
</div>

<div class="kpi-section">
  <div class="kpi-row" id="kpi-cards"></div>
  <div class="section-hd">Partner Summary</div>
  <div class="partner-row" id="partner-cards"></div>
  <div class="section-hd" style="margin-top:4px">Advisor Detail · sorted by T6 enrolment %</div>
</div>

<div class="filter-bar" id="filters">
  <span class="sort-hint">T6 is the key metric — highlighted amber</span>
</div>

<div class="tbl-wrap">
  <table class="tbl">
    <thead id="tbl-head"></thead>
    <tbody id="tbl-body"></tbody>
    <tfoot id="tbl-foot"></tfoot>
  </table>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const ADVISORS_RAW = [
  // ECU
  {name:'Nova Brownlie',       partner:'ECU', pool:316, t5:98,  t6:69},
  {name:'Mia Yourn',           partner:'ECU', pool:307, t5:89,  t6:65},
  {name:'Lily Graciano',       partner:'ECU', pool:313, t5:88,  t6:63},
  {name:'Katina Astles',       partner:'ECU', pool:319, t5:78,  t6:69},
  {name:'Nequila Vincent',     partner:'ECU', pool:319, t5:96,  t6:75},
  {name:'Sofie Katsipodas',    partner:'ECU', pool:323, t5:111, t6:79},
  // VU
  {name:'Aisha Bowie',         partner:'VU',  pool:428, t5:145, t6:97},
  {name:'Annaliese Giegerl',   partner:'VU',  pool:432, t5:160, t6:112},
  {name:'Karen Price',         partner:'VU',  pool:427, t5:184, t6:92},
  {name:'Mary Hammoud',        partner:'VU',  pool:339, t5:165, t6:117},
  // UC
  {name:'Jesse Smith',         partner:'UC',  pool:348, t5:149, t6:118},
  {name:'Mignionne Fernandes', partner:'UC',  pool:278, t5:119, t6:93},
  {name:'Bo Plicharoensuk',    partner:'UC',  pool:342, t5:144, t6:114},
  {name:'Rhea Kapoor',         partner:'UC',  pool:340, t5:121, t6:104},
  {name:'Bianca Ceinar',       partner:'UC',  pool:349, t5:136, t6:114},
  {name:'Khushboo Italiya',    partner:'UC',  pool:345, t5:117, t6:94},
  {name:'David Bell',          partner:'UC',  pool:346, t5:122, t6:106},
];

const PARTNER_META = {
  ECU: {label:'Edith Cowan University',  badgeCls:'pb-ecu', lbCls:'lbp-ECU', barClr:'#6366f1'},
  VU:  {label:'Victoria University',     badgeCls:'pb-vu',  lbCls:'lbp-VU',  barClr:'#06b6d4'},
  UC:  {label:'University of Canberra',  badgeCls:'pb-uc',  lbCls:'lbp-UC',  barClr:'#10b981'},
};

const TERM_COLORS = {t5:'#10b981', t6:'#f59e0b'};

// ─── RAG HELPERS ─────────────────────────────────────────────────────────────
function ragT5(v) { return v >= 0.36 ? '#10b981' : v >= 0.27 ? '#f59e0b' : '#f43f5e'; }
function ragT6(v) { return v >= 0.27 ? '#10b981' : v >= 0.21 ? '#f59e0b' : '#f43f5e'; }
function ragCls(fn, v) {
  const c = fn(v);
  return c === '#10b981' ? 'good' : c === '#f59e0b' ? 'warn' : 'bad';
}
function fmt1(v) { return (v * 100).toFixed(1) + '%'; }
function fmtPct(v) { return Math.round(v * 100) + '%'; }

// ─── DERIVED ─────────────────────────────────────────────────────────────────
const ADVISORS = ADVISORS_RAW.map(a => {
  const p5 = a.t5/a.pool, p6 = a.t6/a.pool;
  return {...a, p5, p6};
});

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeFilter = 'ALL';
let sortCol      = 'p6';
let sortDir      = -1;
let expandedRow  = null;
let showAll      = false;
const PAGE_SIZE  = 10;

// ─── KPI CARDS ───────────────────────────────────────────────────────────────
function renderKPIs() {
  const all  = ADVISORS;
  const pool = all.reduce((s,a) => s + a.pool, 0);
  const t5   = all.reduce((s,a) => s + a.t5, 0);
  const t6   = all.reduce((s,a) => s + a.t6, 0);
  const p5=t5/pool, p6=t6/pool;

  const cards = [
    {
      cls:'c-pool', label:'Eligible Cohort (Pool)',
      value: pool.toLocaleString(), pct: null,
      sub: `Across ${all.length} advisors · 3 partners`,
      barW: 100, barClr:'#6366f1'
    },
    {
      cls:'c-t5', label:'T5 Enrolments',
      value: t5.toLocaleString(), valueCls: ragCls(ragT5, p5), pct: fmt1(p5),
      sub: `of eligible pool`,
      barW: Math.min(p5 * 100, 100), barClr: ragT5(p5)
    },
    {
      cls:'c-t6', label:'T6 Enrolments',
      value: t6.toLocaleString(), valueCls: ragCls(ragT6, p6), pct: fmt1(p6),
      sub: `of eligible pool`,
      barW: Math.min(p6 / 0.35 * 100, 100), barClr: ragT6(p6)
    },
  ];

  document.getElementById('kpi-cards').innerHTML = cards.map(c => `
    <div class="kpi-card ${c.cls}">
      <div class="kpi-label">${c.label}</div>
      <div style="display:flex;align-items:baseline;justify-content:space-between;width:100%">
        <div class="kpi-value${c.valueCls ? ' '+c.valueCls : ''}">${c.value}</div>
        ${c.pct ? `<div class="kpi-value" style="color:#e2e8f0">${c.pct}</div>` : ''}
      </div>
      <div class="kpi-sub">${c.sub}</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${c.barW}%;background:${c.barClr}"></div></div>
    </div>`).join('');
}

// ─── PARTNER CARDS ───────────────────────────────────────────────────────────
function renderPartners() {
  const html = ['ECU','VU','UC'].map(p => {
    const advs = ADVISORS.filter(a => a.partner === p);
    const pool = advs.reduce((s,a) => s + a.pool, 0);
    const t5   = advs.reduce((s,a) => s + a.t5, 0);
    const t6   = advs.reduce((s,a) => s + a.t6, 0);
    const p5=t5/pool, p6=t6/pool;
    const meta = PARTNER_META[p];
    const maxH = 20;
    const scale = v => Math.round(v / p5 * maxH);
    return `
    <div class="pcard">
      <div class="pcard-hd">
        <div class="pcard-name">${meta.label}</div>
        <span class="pcard-badge ${meta.badgeCls}">${p}</span>
      </div>
      <div class="pcard-metrics">
        <div>
          <div class="pm-label">T5</div>
          <div class="pm-value ${ragCls(ragT5,p5)}">${fmtPct(p5)}</div>
        </div>
        <div>
          <div class="pm-label">T6</div>
          <div class="pm-value ${ragCls(ragT6,p6)}">${fmtPct(p6)}</div>
        </div>
      </div>
      <div class="pcard-trend">
        <div class="pcard-trend-bar" style="height:${scale(p5)}px;background:${TERM_COLORS.t5};opacity:.7"></div>
        <div class="pcard-trend-bar" style="height:${scale(p6)}px;background:${TERM_COLORS.t6}"></div>
      </div>
      <div style="margin-top:10px;display:flex;gap:6px;align-items:center">
      </div>
    </div>`;
  }).join('');
  document.getElementById('partner-cards').innerHTML = html;
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function renderFilters() {
  const el = document.getElementById('filters');
  const hint = el.querySelector('.sort-hint');
  el.innerHTML = '';
  ['ALL','ECU','VU','UC'].forEach(p => {
    const b = document.createElement('button');
    b.className = 'fbtn' + (activeFilter === p ? ' act' : '');
    b.textContent = p === 'ALL' ? 'All Partners' : p;
    b.onclick = () => { activeFilter = p; showAll = false; expandedRow = null; renderFilters(); renderTable(); };
    el.appendChild(b);
  });
  const s = document.createElement('span');
  s.className = 'sort-hint';
  s.textContent = 'T6 is the key metric — highlighted amber';
  el.appendChild(s);
}

// ─── TABLE ───────────────────────────────────────────────────────────────────
const COLS = [
  {key:null,   label:'',            th:'left',  nosort:true},
  {key:'name', label:'Advisor',     th:'left'},
  {key:'partner',label:'Partner',   th:'left'},
  {key:'pool', label:'Pool',        th:'right'},
  {key:'t5',   label:'T5 Enrolled', th:'right'},
  {key:'p5',   label:'T5 %',        th:'right'},
  {key:'t6',   label:'T6 Enrolled', th:'right', t6:true},
  {key:'p6',   label:'T6 %',        th:'right', t6:true},
];

function renderTableHead() {
  document.getElementById('tbl-head').innerHTML = `<tr>${COLS.map(c => {
    if(c.nosort) return `<th class="${c.th}"></th>`;
    const sorted = sortCol === c.key;
    const arrow  = sorted ? (sortDir === -1 ? '▼' : '▲') : '▼';
    const extra  = c.t6 ? ' t6-col' : c.riskCol ? ' risk-col' : '';
    return `<th class="${c.th}${extra}${sorted ? ' sorted' : ''}" onclick="setSort('${c.key}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('')}</tr>`;
}

function setSort(key) {
  if(sortCol === key) sortDir *= -1;
  else { sortCol = key; sortDir = -1; }
  expandedRow = null;
  renderTable();
}

function termCell(n, pct, ragFn, isBest) {
  const clr = ragFn(pct);
  return `
    <div style="display:flex;align-items:center;gap:5px;justify-content:flex-end">
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct*100/0.75*100,100)}%;background:${clr}"></div></div>
      <span style="color:${clr};min-width:38px;text-align:right">${fmt1(pct)}</span>
    </div>`;
}

function renderTable() {
  renderTableHead();

  const filtered = ADVISORS
    .filter(a => activeFilter === 'ALL' || a.partner === activeFilter)
    .sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if(typeof av === 'string') return sortDir * av.localeCompare(bv);
      return sortDir * (av - bv);
    });

  const isAll  = activeFilter === 'ALL';
  const visible = (isAll && !showAll) ? filtered.slice(0, PAGE_SIZE) : filtered;
  const hidden  = filtered.length - visible.length;

  let rows = '';
  visible.forEach((a, i) => {
    const meta   = PARTNER_META[a.partner];
    const isExp  = expandedRow === a.name;
    const badge  = `<span class="lb-partner ${meta.lbCls}">${a.partner}</span>`;

    rows += `
    <tr class="adv-row${isExp ? ' expanded' : ''}" onclick="toggleRow('${a.name.replace(/'/g,"\\'")}')">
      <td class="left" style="color:#475569;font-size:11px;width:28px">${i+1}</td>
      <td class="left">${a.name}<span class="chev">▶</span></td>
      <td class="left">${badge}</td>
      <td style="color:#94a3b8">${a.pool.toLocaleString()}</td>
      <td style="color:#10b981">${a.t5}</td>
      <td>${termCell(a.t5, a.p5, ragT5)}</td>
      <td class="t6-col" style="color:#f59e0b;font-weight:700">${a.t6}</td>
      <td class="t6-col">${termCell(a.t6, a.p6, ragT6)}</td>
    </tr>
    <tr class="expand-row${isExp ? ' open' : ''}">
      <td colspan="8">
        <div class="expand-panel">${buildExpandPanel(a)}</div>
      </td>
    </tr>`;
  });

  if(hidden > 0) {
    rows += `<tr class="show-more-row">
      <td colspan="8">
        <button class="show-more-btn" onclick="showAllRows()">▾ Show ${hidden} more advisors</button>
      </td>
    </tr>`;
  }

  if(!filtered.length) rows = `<tr><td colspan="8" class="no-data">No advisors match the selected filter.</td></tr>`;

  // Footer
  const pool = filtered.reduce((s,a) => s + a.pool, 0);
  const t5   = filtered.reduce((s,a) => s + a.t5, 0);
  const t6   = filtered.reduce((s,a) => s + a.t6, 0);
  const p5=t5/pool, p6=t6/pool;

  document.getElementById('tbl-body').innerHTML = rows;
  document.getElementById('tbl-foot').innerHTML = `
    <tr>
      <td class="left" colspan="2">Total / ${filtered.length} advisors</td>
      <td class="left"></td>
      <td style="color:#94a3b8">${pool.toLocaleString()}</td>
      <td style="color:#10b981">${t5.toLocaleString()}</td>
      <td style="text-align:right;color:${ragT5(p5)}">${fmt1(p5)}</td>
      <td class="t6-col" style="color:#f59e0b">${t6.toLocaleString()}</td>
      <td class="t6-col" style="text-align:right;color:${ragT6(p6)}">${fmt1(p6)}</td>
    </tr>`;
}

function showAllRows() { showAll = true; renderTable(); }

// ─── EXPAND PANEL ────────────────────────────────────────────────────────────
function buildExpandPanel(a) {
  const terms = [
    {key:'t5', label:'T5', n:a.t5, pct:a.p5, rag:ragT5, clr:TERM_COLORS.t5, note:'Pre-enrolment'},
    {key:'t6', label:'T6', n:a.t6, pct:a.p6, rag:ragT6, clr:TERM_COLORS.t6, note:'★ Target term'},
  ];

  const barsHtml = terms.map(t => {
    const clr = t.rag(t.pct);
    const w   = Math.min(t.pct / 0.75 * 100, 100);
    return `
      <div class="ep-term">
        <span class="ep-term-label" style="color:${t.clr}">${t.label}</span>
        <div class="ep-term-bar-bg">
          <div class="ep-term-bar" style="width:${w}%;background:${clr}"></div>
        </div>
        <span class="ep-term-pct" style="color:${clr}">${fmt1(t.pct)}</span>
        <span class="ep-term-n">${t.n} / ${a.pool}</span>
      </div>`;
  }).join('');

  return `
    <div class="ep-section" style="min-width:280px">
      <div class="ep-title">Term-by-Term Cohort Conversion</div>
      ${barsHtml}
    </div>`;
}

// ─── ROW EXPAND ──────────────────────────────────────────────────────────────
function toggleRow(name) {
  expandedRow = expandedRow === name ? null : name;
  renderTable();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderKPIs();
renderPartners();
renderFilters();
renderTable();
</script>
</body>
